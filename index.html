<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>go.safi | Premium Cleaning</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --brand-red: #e11d48; --brand-blue: #1e40af; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .bg-brand-red { background-color: var(--brand-red); }
        .bg-brand-blue { background-color: var(--brand-blue); }
        .text-brand-red { color: var(--brand-red); }
        .text-brand-blue { color: var(--brand-blue); }
        
        /* Modal Animation */
        #booking-modal { transition: opacity 0.3s ease, visibility 0.3s ease; }
        .modal-content { transition: transform 0.3s ease; transform: scale(0.9); }
        .modal-open .modal-content { transform: scale(1); }
    </style>
</head>
<body class="bg-slate-50">

    <div class="bg-brand-red text-white py-2 text-center text-[10px] font-bold uppercase tracking-widest">
        Free Pickup & Delivery Within 24 - 36 Hours
    </div>

    <header class="bg-white border-b border-slate-200 py-4 px-6 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="h-10 w-10 bg-brand-blue rounded-lg flex items-center justify-center text-white font-black italic">gs</div>
                <span class="text-brand-blue font-black text-xl uppercase tracking-tighter">go.safi</span>
            </div>
            
            <div class="flex items-center gap-4">
                <a href="tel:0707799266" class="hidden md:block text-brand-blue font-bold text-sm hover:text-brand-red">0707 799 266</a>
                <button onclick="openModal()" class="bg-brand-red text-white px-6 py-2.5 rounded-full font-bold text-xs uppercase shadow-lg hover:brightness-110 active:scale-95 transition-all">
                    Book Now
                </button>
            </div>
        </div>
    </header>

    <section class="py-20 px-6 text-center">
        <h1 class="text-brand-blue font-black text-6xl md:text-8xl mb-6 tracking-tighter leading-none">
            Safi. Swift.<br><span class="text-brand-red">Superior.</span>
        </h1>
        <p class="text-slate-500 max-w-xl mx-auto text-lg mb-10">
            Premium laundry and specialized cleaning. Delivered to your door in 24-36 hours.
        </p>
        <div class="flex justify-center gap-4">
            <button onclick="openModal()" class="bg-brand-blue text-white px-8 py-4 rounded-2xl font-bold shadow-xl">Start Pickup</button>
            <button onclick="window.location.href='https://wa.me/254707799266'" class="bg-white text-brand-blue border border-brand-blue px-8 py-4 rounded-2xl font-bold">WhatsApp Us</button>
        </div>
    </section>

    <div id="booking-modal" class="fixed inset-0 z-[100] invisible opacity-0 bg-brand-blue/90 backdrop-blur-sm flex items-center justify-center p-6">
        <div class="modal-content bg-white w-full max-w-md rounded-[32px] p-8 relative shadow-2xl">
            <button onclick="closeModal()" class="absolute top-6 right-6 text-slate-400 hover:text-brand-red">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
            </button>
            
            <h2 class="text-2xl font-black text-brand-blue mb-2 uppercase italic">Request Pickup</h2>
            <p class="text-slate-400 text-xs font-bold mb-6 uppercase tracking-widest">24-36hr Delivery Guarantee</p>
            
            <form id="pickupForm" class="space-y-4">
                <input type="text" id="name" placeholder="Full Name" class="w-full bg-slate-100 border-none rounded-xl p-4 outline-none focus:ring-2 focus:ring-brand-red" required>
                <input type="tel" id="phone" placeholder="Phone Number" class="w-full bg-slate-100 border-none rounded-xl p-4 outline-none focus:ring-2 focus:ring-brand-red" required>
                <select id="service" class="w-full bg-slate-100 border-none rounded-xl p-4 outline-none">
                    <option>Standard Laundry</option>
                    <option>Carpet Cleaning</option>
                    <option>Curtain Steaming</option>
                </option>
                <button type="submit" class="w-full bg-brand-red text-white py-4 rounded-xl font-bold uppercase tracking-widest shadow-lg">Confirm Booking</button>
            </form>
        </div>
    </div>

    <script>
        // Modal Logic
        const modal = document.getElementById('booking-modal');
        
        function openModal() {
            modal.classList.remove('invisible', 'opacity-0');
            modal.classList.add('visible', 'opacity-100', 'modal-open');
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            modal.classList.add('invisible', 'opacity-0');
            modal.classList.remove('visible', 'opacity-100', 'modal-open');
            document.body.style.overflow = 'auto';
        }

        // Form Logic
        document.getElementById('pickupForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const name = document.getElementById('name').value;
            const service = document.getElementById('service').value;
            alert(`Thank you, ${name}! Your request for ${service} has been received. We will contact you for pickup shortly.`);
            closeModal();
        });

        // Close modal when clicking outside content
        modal.addEventListener('click', function(e) {
            if (e.target === modal) closeModal();
        });
    </script>
</body>
</html>
